{% extends "base.html" %}
{% block content %}
<section class="page-hero"><h1>Manage Devotionals</h1><p>Add, review, and remove daily devotionals.</p></section>
<section class="section content-layout">
  <form method="post" class="content-panel stacked-form">
    <input name="title" placeholder="Title" required><input name="scripture" placeholder="Scripture">
    <select name="category_id"><option value="">Category</option>{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select>
    <textarea name="content" placeholder="Devotional content" required></textarea><button class="btn btn-gold">Add Devotional</button>
  </form>
  <div class="content-panel">{% for item in devotionals %}<div class="admin-row"><strong>{{ item.title }}</strong><form action="{{ url_for('delete_devotional', item_id=item.id) }}" method="post"><button class="danger">Delete</button></form></div>{% endfor %}</div>
</section>
{% endblock %}
