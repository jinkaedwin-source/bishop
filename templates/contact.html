{% extends "base.html" %}
{% block content %}
<section class="page-hero"><h1>Contact</h1><p>We would love to hear from you.</p></section>
<section class="section split">
  <form method="post" class="content-panel stacked-form">
    <input name="name" placeholder="Name" required>
    <input name="email" type="email" placeholder="Email" required>
    <textarea name="message" placeholder="Message" required></textarea>
    <button class="btn btn-gold" type="submit">Send Message</button>
  </form>
  <div class="content-panel"><h2>Visit Us</h2><p>LIGHT International Ministry Campus</p><p>Sunday 9:00 AM | Wednesday 6:30 PM | Friday 7:00 PM</p><p>Email: info@lightinternationalministry.org</p></div>
</section>
{% endblock %}
